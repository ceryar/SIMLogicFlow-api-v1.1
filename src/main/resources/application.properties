spring.application.name=simlogicflow-api

# ── Puerto (Railway lo inyecta automáticamente como $PORT) ────────────────────
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:my-secret-key-that-is-at-least-256-bits-long-for-jwt-signing}
jwt.expiration=${JWT_EXPIRATION:36000000}

# ── Base de datos (Railway PostgreSQL inyecta DATABASE_URL) ───────────────────
# En Railway: agrega el plugin PostgreSQL y las variables se setean automáticamente
#spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/SIMLogicFlow}
#spring.datasource.username=${PGUSER:ceryar}
#spring.datasource.password=${PGPASSWORD:lamisma}

# Priorizar DATABASE_URL (estándar de Railway), fallback a variables individuales o localhost
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:SIMLogicFlow}}
spring.datasource.username=${PGUSER:ceryar}
spring.datasource.password=${PGPASSWORD:lamisma}

spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool (importante para Railway con conexiones limitadas)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${DATABASE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── CORS (permite peticiones del frontend en Railway) ─────────────────────────
# El frontend URL se configura como variable de entorno FRONTEND_URL en Railway
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}